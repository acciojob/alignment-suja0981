<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Assignment 3</title>
    <style>
        table {
            border: 1px solid black;
            border-spacing: 1px;
            margin-bottom: 20px;
        }

        td {
            border: 1px solid black;
            padding: 1px;
            width: 60px;
            height: 40px;
        }

        .middle {
            margin: 20px auto;
        }

        .center {
            text-align: center;
        }

        .right {
            text-align: right;
        }

        .green {
            background-color: green;
        }

        .blue {
            background-color: blue;
        }

        #t-image img {
            width: 150px;
            height: auto;
            display: block;
            margin: auto;
        }

        h1 {
            text-align: center;
        }
    </style>
</head>
<body>

    <h1>HTML Assignment #3</h1>

    <!-- Table 1 -->
    <table id="table-1" class="middle">
        <tr>
            <td id="t11">1</td>
            <td id="t12">2</td>
            <td id="t13" class="right">3</td>
        </tr>
        <tr>
            <td class="center">4</td>
            <td class="center">5</td>
            <td class="center right">6</td>
        </tr>
        <tr>
            <td>7</td>
            <td>8</td>
            <td class="right">9</td>
        </tr>
    </table>

    <!-- Table 2 -->
    <table id="table-2" class="middle">
        <tr>
            <td id="t21" colspan="6" class="center">Header Cell</td>
        </tr>
        <tr>
            <td></td><td></td><td></td><td></td><td></td><td></td>
        </tr>
        <tr>
            <td></td><td></td><td></td><td></td><td></td><td></td>
        </tr>
        <tr>
            <td></td><td></td><td></td><td></td><td></td><td></td>
        </tr>
        <tr>
            <td></td><td></td><td></td><td></td><td></td><td></td>
        </tr>
        <tr>
            <td></td><td></td><td></td><td></td><td></td><td></td>
        </tr>
    </table>

    <!-- Table 3 -->
    <table id="table-3" class="middle">
        <tr class="green">
            <td colspan="3">&nbsp;</td>
        </tr>
        <tr>
            <td></td>
            <td id="t-image">
                <img src="https://via.placeholder.com/150" alt="Sample Image">
            </td>
            <td></td>
        </tr>
        <tr class="blue">
            <td colspan="3">&nbsp;</td>
        </tr>
    </table>

</body>
</html>
